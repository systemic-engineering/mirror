[package]
name = "conversation"
version = "0.1.0"
edition = "2021"
license-file = "LICENSE.md"
description = "Traceables over trees"

[features]
default = []
git = ["fragmentation/git"]

[dependencies]
fragmentation = { path = "../fragmentation" }
serde_json = "1"
sha2 = "0.10"
hex = "0.4"
age = { version = "0.11", features = ["ssh"] }
base64 = "0.22"
eetf = "0.11"

[dev-dependencies]
tempfile = "3"
